name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck web
        run: npx tsc --noEmit

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Typecheck worker
        run: npx tsc --noEmit
        working-directory: worker
