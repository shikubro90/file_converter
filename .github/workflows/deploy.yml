name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/file_converter
            git pull origin main

            # Install / update nginx site config
            cp nginx.conf /etc/nginx/sites-available/anyconv.betopialimited.com
            ln -sf /etc/nginx/sites-available/anyconv.betopialimited.com \
                   /etc/nginx/sites-enabled/anyconv.betopialimited.com
            nginx -t && systemctl reload nginx

            # Rebuild and restart app containers (no nginx container)
            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Deploy complete: $(date)"
